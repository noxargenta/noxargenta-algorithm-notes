#include <stdio.h>
#include <stdlib.h>

// 1. 定义链表结构体
struct ListNode {
    int val;
    struct ListNode* next;
};

// =======================
// 手搓轻量级哈希表 (用于替代 C++ 的 unordered_set)
// =======================
#define HASH_SIZE 1007 // 质数大小
struct HashNode {
    int val;
    struct HashNode* next;
};
struct HashNode* hashTable[HASH_SIZE] = {NULL}; // 全局哈希表数组

// 哈希函数，注意处理负数取模
int getHash(int val) {
    return ((val % HASH_SIZE) + HASH_SIZE) % HASH_SIZE;
}

// 将值插入哈希表
void insertHash(int val) {
    int idx = getHash(val);
    struct HashNode* newNode = (struct HashNode*)malloc(sizeof(struct HashNode));
    newNode->val = val;
    // 头插法连入哈希表的拉链中
    newNode->next = hashTable[idx];
    hashTable[idx] = newNode;
}

// 在哈希表中查找值是否存在，存在返回1，否则返回0
int containsHash(int val) {
    int idx = getHash(val);
    struct HashNode* p = hashTable[idx];
    while (p != NULL) {
        if (p->val == val) return 1;
        p = p->next;
    }
    return 0;
}
// =======================


// 辅助函数：根据数组构造链表 (尾插法 + 哑节点思想)
struct ListNode* createList(int arr[], int size) {
    struct ListNode dummy; // 栈上分配哑节点
    dummy.next = NULL;
    struct ListNode* tail = &dummy;

    for (int i = 0; i < size; i++) {
        struct ListNode* newNode = (struct ListNode*)malloc(sizeof(struct ListNode));
        newNode->val = arr[i];
        newNode->next = NULL;
        tail->next = newNode;
        tail = tail->next;
    }
    return dummy.next;
}

// 辅助函数：打印链表 (无空格格式)
void printList(const char* prefix, struct ListNode* head) {
    printf("%s", prefix);
    while (head != NULL) {
        printf("%d", head->val);
        head = head->next;
    }
    printf("\n");
}

int main() {
    // 1. 准备数据
    int arrA[] = {2, -8, 4, 5, 11, 7};
    int arrB[] = {2, 3, 5, 6};
    
    struct ListNode* La = createList(arrA, 6);
    struct ListNode* Lb = createList(arrB, 4);

    printList("链表La:", La);
    printList("链表Lb:", Lb);

    // 2. 将 Lb 的所有元素放入哈希表 (时间复杂度 O(M))
    struct ListNode* pB = Lb;
    while (pB != NULL) {
        insertHash(pB->val);
        pB = pB->next;
    }

    // 3. 遍历 La 求差集 (时间复杂度 O(N))
    struct ListNode dummy; // 构建 Lc 用的哑节点
    dummy.next = NULL;
    struct ListNode* tail = &dummy;

    struct ListNode* pA = La;
    while (pA != NULL) {
        // 如果在哈希表中找不到，说明是差集元素
        if (!containsHash(pA->val)) {
            struct ListNode* newNode = (struct ListNode*)malloc(sizeof(struct ListNode));
            newNode->val = pA->val;
            newNode->next = NULL;
            tail->next = newNode;
            tail = tail->next; // 尾指针后移
        }
        pA = pA->next;
    }
    
    struct ListNode* Lc = dummy.next;

    // 4. 输出结果
    printList("链表Lc:", Lc);

    return 0;
}